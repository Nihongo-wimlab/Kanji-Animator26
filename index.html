<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Kanji Animator ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/wanakana"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root{--sakura:#ffb7c5;--magic-purple:#9d72ff}
        body{font-family:'Fredoka','Noto Sans JP',sans-serif;background:linear-gradient(135deg,#fce4ec 0%,#e3f2fd 100%);min-height:100vh}
        .kawaii-card{background:rgba(255,255,255,0.9);backdrop-filter:blur(5px);border:3px solid white;box-shadow:0 10px 25px rgba(255,183,197,0.3);border-radius:2rem;transition:transform .3s ease}
        .kawaii-card:hover{transform:translateY(-5px)}
        .stroke-path{fill:none;stroke:var(--magic-purple);stroke-width:4;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1000;stroke-dashoffset:1000}
        @keyframes draw{to{stroke-dashoffset:0}}
        @keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}
        .floating{animation:float 4s ease-in-out infinite}
        .suggestion-chip{transition:all .2s;cursor:pointer}
        .suggestion-chip:hover{transform:scale(1.1);background-color:#ffeff2;border-color:var(--sakura)}
        .manga-container{width:280px;height:280px;border-radius:1.5rem;overflow:hidden;border:4px solid white;box-shadow:0 8px 16px rgba(0,0,0,0.1);background:white;display:flex;align-items:center;justify-content:center}
        .shodo-composition{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background-color:#fffafb}
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">
    <div class="max-w-4xl w-full bg-white/70 backdrop-blur-md rounded-[3rem] shadow-2xl p-8 md:p-12 border-4 border-white relative overflow-hidden">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-pink-500 tracking-tighter floating">漢字 Kanji Animator ✨</h1>
            <p class="text-indigo-400 mt-2 font-semibold text-lg italic">Typ in Romaji en kies de juiste Kanji!</p>
            <div class="text-[10px] text-pink-300 font-bold uppercase tracking-[0.2em] opacity-80 mt-4">© w.oostindier@gemini 2026</div>
        </header>
        <div class="flex flex-col gap-2 mb-12 relative">
            <div id="sB" class="flex flex-wrap gap-2 mb-2 min-h-[40px] justify-center px-4"></div>
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-1">
                    <input type="text" id="kI" placeholder="Typ bijv. 'sensei'" class="w-full px-8 py-5 bg-white border-3 border-pink-100 rounded-3xl focus:border-pink-300 focus:ring-8 focus:ring-pink-50 focus:outline-none text-3xl text-center transition-all shadow-inner">
                </div>
                <button onclick="_pI()" class="bg-gradient-to-r from-pink-400 to-rose-300 font-black text-xl py-5 px-12 text-white rounded-3xl transition-all shadow-xl active:scale-95 hover:scale-105">Animeer! 🌸</button>
            </div>
            <div class="flex flex-wrap items-center justify-center gap-6 mt-6">
                <div class="flex items-center gap-2">
                    <label for="dS" class="text-xs font-black text-purple-400 uppercase tracking-widest">Woordenboek:</label>
                    <select id="dS" onchange="_uL();_rL();" class="bg-white border-2 border-pink-100 rounded-xl px-4 py-2 text-pink-500 font-bold focus:outline-none focus:border-pink-300">
                        <option value="jisho">Jisho.org</option>
                        <option value="tangorin">Tangorin.com</option>
                        <option value="kanshudo">Kanshudo</option>
                        <option value="wanikani">WaniKani</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="lC" class="hidden mb-8 flex justify-center">
            <a id="mL" href="#" target="_blank" class="flex items-center gap-3 px-8 py-4 bg-white border-2 border-purple-200 text-purple-600 rounded-2xl font-black hover:bg-purple-50 transition-all shadow-sm">
                <span class="text-xl">📖</span><span id="lT">Bekijk op Jisho</span>
            </a>
        </div>
        <div id="dA" class="flex flex-wrap justify-center gap-8 min-h-[350px] items-center">
             <div class="flex flex-col items-center text-pink-400">
                <div class="text-4xl font-bold mb-6">がんばって!</div>
                <div class="manga-container">
                    <div class="shodo-composition"><div class="text-[90px] font-serif text-gray-800">漢字</div><div class="mt-4 bg-pink-50 px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Klaar om te tekenen ✨</div></div>
                </div>
            </div>
        </div>
        <div class="mt-16 bg-white/50 rounded-[2.5rem] p-8 border-2 border-white shadow-inner text-center">
            <label class="block text-sm font-black text-purple-400 mb-3 uppercase tracking-widest">Teken-snelheid ⚡</label>
            <input type="range" id="sS" min="0.2" max="3" step="0.2" value="1.2" class="w-full h-4 bg-pink-100 rounded-full appearance-none cursor-pointer accent-pink-400 border-2 border-white mb-2">
        </div>
    </div>
    <footer class="mt-8 text-pink-400 text-xs font-bold bg-white/50 px-6 py-2 rounded-full border border-white flex flex-col items-center gap-1">
        <span>Veilig voor GitHub Pages & Geen API nodig 🎀</span>
        <span class="opacity-70">minifi-versie 16mrt26</span>
    </footer>
    <script>
        const _i=document.getElementById('kI'),_s=document.getElementById('sB');let _g=0;wanakana.bind(_i);
        _i.addEventListener('input',async()=>{const v=_i.value;_uL();if(v.length>0){const u=`https://inputtools.google.com/request?itc=ja-t-i0-und&num=10&cp=0&cs=1&ie=utf-8&oe=utf-8&app=jsapi&text=${encodeURIComponent(v)}`;try{const r=await fetch(u),d=await r.json();if(d[0]==="SUCCESS"){_s.innerHTML='';d[1][0][1].forEach(t=>{const b=document.createElement('button');b.className="suggestion-chip px-4 py-2 bg-white border-2 border-pink-100 rounded-2xl text-pink-600 font-bold shadow-sm";b.innerText=t;b.onclick=()=>{_i.value=t;_s.innerHTML='';_uL();_pI()};_s.appendChild(b)})}}catch(e){}}else{_s.innerHTML=''}});
        function _gU(t,d){switch(d){case "tangorin":return `https://tangorin.com/kanji?search=${encodeURIComponent(t)}`;case "kanshudo":return `https://www.kanshudo.com/search?q=${encodeURIComponent(t)}`;case "wanikani":return `https://www.wanikani.com/kanji/${encodeURIComponent([...t][0])}`;default:return `https://jisho.org/search/${encodeURIComponent(t)}`}};
        function _uL(){const v=_i.value.trim(),d=document.getElementById('dS').value,c=document.getElementById('lC'),m=document.getElementById('mL'),t=document.getElementById('lT');if(!v){c.classList.add('hidden');return}const n={jisho:"Jisho.org",tangorin:"Tangorin",kanshudo:"Kanshudo",wanikani:"WaniKani"};m.href=_gU(v,d);t.innerText=`Bekijk op ${n[d]}`;c.classList.remove('hidden')};
        function _rL(){const d=document.getElementById('dS').value,n={jisho:"Jisho",tangorin:"Tangorin",kanshudo:"Kanshudo",wanikani:"WaniKani"};document.querySelectorAll('.mini-dict-link').forEach(l=>{const c=l.getAttribute('data-char');l.href=_gU(c,d);l.querySelector('.dict-name').innerText=n[d]})};
        async function _pI(){const v=_i.value.trim(),a=document.getElementById('dA');if(!v)return;a.innerHTML='<div class="animate-spin h-12 w-12 border-b-4 border-pink-500"></div>';const ch=[...v];_g=0;const k=[];for(const c of ch){const r=await fetch(`https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${c.charCodeAt(0).toString(16).padStart(5,'0')}.svg`);if(r.ok){const s=await r.text();k.push({c,d:new DOMParser().parseFromString(s,"image/svg+xml")})}}a.innerHTML='';if(k.length===0){a.innerHTML='fout';return}k.forEach(x=>_rC(x.c,x.d))};
        function _rC(c,d){const a=document.getElementById('dA'),di=document.getElementById('dS').value,n={jisho:"Jisho",tangorin:"Tangorin",kanshudo:"Kanshudo",wanikani:"WaniKani"},o=document.createElement('div');o.className="kawaii-card p-8 flex flex-col items-center relative";const s="http://www.w3.org/2000/svg",v=document.createElementNS(s,"svg");v.setAttribute("viewBox","0 0 109 109");v.setAttribute("class","w-44 h-44");v.innerHTML=`<line x1="0" y1="54.5" x2="109" y2="54.5" stroke="#ffb7c5" stroke-dasharray="5" opacity="0.4"/><line x1="54.5" y1="0" x2="54.5" y2="109" stroke="#ffb7c5" stroke-dasharray="5" opacity="0.4"/><rect x="0" y="0" width="109" height="109" fill="none" stroke="#ffb7c5" stroke-width="1" opacity="0.3" rx="10"/>`;const sp=parseFloat(document.getElementById('sS').value);d.querySelectorAll('path').forEach(p=>{const pa=document.createElementNS(s,"path");pa.setAttribute("d",p.getAttribute('d'));pa.setAttribute("class","stroke-path");pa.style.animation=`draw ${0.7/sp}s ${_g*(0.85/sp)}s forwards ease-in-out`;v.appendChild(pa);_g++});o.appendChild(v);const l=document.createElement('div');l.className="mt-4 text-5xl font-black text-pink-500";l.innerText=c;o.appendChild(l);const k=document.createElement('a');k.href=_gU(c,di);k.target="_blank";k.className="mini-dict-link mt-4 flex items-center gap-2 px-4 py-2 bg-purple-50 text-purple-600 rounded-xl text-xs font-black border border-purple-100";k.setAttribute('data-char',c);k.innerHTML=`<span>📖</span><span class="dict-name">${n[di]}</span>`;o.appendChild(k);a.appendChild(o)}
        _i.addEventListener('keypress',e=>{if(e.key==='Enter')_pI()});
    </script>
</body>
</html>
